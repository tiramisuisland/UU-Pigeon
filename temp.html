<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Interactive GLB</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family: sans-serif;
}

#hint {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
}
</style>

<!-- THREE IMPORT MAP -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.178/build/three.module.js",
    "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.178/examples/jsm/"
  }
}
</script>

</head>

<body>

<div id="hint">點擊模型播放動畫 / 拖曳旋轉 / 滾輪縮放</div>

<script type="module">

import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';


// =========================
// Scene
// =========================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);


// =========================
// Camera
// =========================

const camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.set(0, 1.5, 4);


// =========================
// Renderer
// =========================

const renderer = new THREE.WebGLRenderer({
    antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);


// =========================
// Controls
// =========================

const controls = new OrbitControls(camera, renderer.domElement);

controls.enableDamping = true;
controls.dampingFactor = 0.08;

controls.enableZoom = true;
controls.enableRotate = true;
controls.enablePan = true;

controls.minDistance = 1.5;
controls.maxDistance = 10;

controls.minPolarAngle = 0.3;
controls.maxPolarAngle = Math.PI - 0.3;

controls.screenSpacePanning = true;


// =========================
// Light
// =========================

scene.add(new THREE.AmbientLight(0xffffff, 2));

const light = new THREE.DirectionalLight(0xffffff, 3);
light.position.set(5, 10, 5);
scene.add(light);


// =========================
// Video Texture
// =========================

const video = document.createElement('video');
video.src = '大偶90.mov';
video.loop = true;
video.muted = false;
video.playsInline = true;
video.preload = "auto";

const videoTexture = new THREE.VideoTexture(video);
videoTexture.colorSpace = THREE.SRGBColorSpace;

// 🔥 上下翻轉
videoTexture.repeat.y = -1;
videoTexture.offset.y = 1;


// =========================
// Animation System
// =========================

let mixer = null;
let gltfRef = null;
let clickableModel = null;

const clock = new THREE.Clock();


// =========================
// Raycaster (click detect)
// =========================

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();


// =========================
// Load GLB
// =========================

const loader = new GLTFLoader();

loader.load(

    'read_man1.glb',

    (gltf) => {

        gltfRef = gltf;

        const model = gltf.scene;
        scene.add(model);

        clickableModel = model;

        console.log("GLB loaded");

        // -------------------------
        // 📺 Video apply
        // -------------------------

        let applied = false;

        model.traverse((obj) => {

            if (obj.isMesh) {

                console.log("Mesh:", obj.name);

                if (obj.name === "BoxA") {

                    obj.material = new THREE.MeshBasicMaterial({
                        map: videoTexture
                    });

                    applied = true;
                }
            }
        });

        if (!applied) {

            console.warn("BoxA not found → fallback");

            const first = model.getObjectByProperty("type", "Mesh");

            if (first) {
                first.material = new THREE.MeshBasicMaterial({
                    map: videoTexture
                });
            }
        }


        // -------------------------
        // 🎬 Animation setup
        // -------------------------

        mixer = new THREE.AnimationMixer(model);

        console.log("Animations:", gltf.animations);

        if (gltf.animations && gltf.animations.length > 0) {

            const clip =
                THREE.AnimationClip.findByName(
                    gltf.animations,
                    "骨架Action"
                ) || gltf.animations[0];

            const action = mixer.clipAction(clip);

            action.setLoop(THREE.LoopOnce, 1);
            action.clampWhenFinished = true;
            action.play();

        }


        // -------------------------
        // 📐 Auto framing
        // -------------------------

        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();

        box.getSize(size);
        box.getCenter(center);

        controls.target.copy(center);

        const maxSize = Math.max(size.x, size.y, size.z);
        const distance = maxSize * 1.5;

        camera.position.set(
            center.x,
            center.y + maxSize * 0.2,
            center.z + distance
        );

        camera.lookAt(center);
        controls.update();


        // -------------------------
        // ▶ Video play
        // -------------------------

        video.play().catch(()=>{});

    }

);


// =========================
// Click → play animation
// =========================

window.addEventListener("click", (event) => {

    if (!clickableModel || !mixer || !gltfRef) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const hits = raycaster.intersectObject(clickableModel, true);

    if (hits.length > 0) {

        console.log("🎯 clicked model → play animation");

        const clip =
            THREE.AnimationClip.findByName(
                gltfRef.animations,
                "骨架Action"
            ) || gltfRef.animations[0];

        const action = mixer.clipAction(clip);

        action.reset();
        action.setLoop(THREE.LoopOnce, 1);
        action.clampWhenFinished = true;
        action.play();
    }
});


// =========================
// Click unlock audio
// =========================

window.addEventListener("click", async () => {

    try {
        await video.play();
        document.getElementById("hint").style.display = "none";
    } catch (e) {}
});


// =========================
// Resize
// =========================

window.addEventListener("resize", () => {

    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth, window.innerHeight);

});


// =========================
// Render loop
// =========================

function animate() {

    requestAnimationFrame(animate);

    controls.update();

    const delta = clock.getDelta();

    if (mixer) mixer.update(delta);

    renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
